{% extends "base.html" %}

{% block title %}Add Patient - LifeLink{% endblock %}

{% block content %}
    <div style="text-align: center; margin-bottom: 40px;">
        <p style="color: #dc2626; font-weight: 600; letter-spacing: 2px; font-size: 12px; margin-bottom: 15px;">PATIENT MANAGEMENT</p>
        <h1 style="font-size: 42px; color: #111; margin-bottom: 15px;">Add Patient</h1>
        <p style="color: #666; font-size: 16px;">Register a new patient requiring blood transfusion</p>
    </div>

    {% if message %}
        <div class="message {% if 'successfully' in message or 'added' in message %}success{% else %}error{% endif %}" style="max-width: 500px; margin: 20px auto;">
            {{ message }}
        </div>
    {% endif %}

    <div class="form-container">
        <form method="post" action="{% url 'AddPatientAction' %}" onsubmit="return validatePatient(this)">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="patient_name">PATIENT NAME</label>
                <input type="text" id="patient_name" name="t1" placeholder="Enter patient name" required>
            </div>

            <div class="form-group">
                <label for="blood_type">BLOOD TYPE NEEDED</label>
                <select id="blood_type" name="t2" required>
                    <option value="">Select Blood Type</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <div class="form-group">
                <label for="quantity">QUANTITY (LITRES)</label>
                <input type="number" id="quantity" name="t3" placeholder="Enter quantity" step="0.1" min="0.1" required>
            </div>

            <div class="form-group">
                <label for="condition">MEDICAL CONDITION</label>
                <textarea id="condition" name="t4" placeholder="Describe the medical condition" required></textarea>
            </div>

            <button type="submit">Add Patient</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <p style="color: #666;">
                <a href="{% url 'HospitalDashboard' %}" style="color: #dc2626; text-decoration: none; font-weight: 600;">← Back to Dashboard</a>
            </p>
        </div>
    </div>

    <script>
        function validatePatient(form) {
            if(form.t1.value.length == 0) {
                alert("Please enter patient name");
                form.t1.focus();
                return false;
            }
            if(form.t2.value.length == 0) {
                alert("Please select blood type");
                form.t2.focus();
                return false;
            }
            if(form.t3.value.length == 0) {
                alert("Please enter quantity");
                form.t3.focus();
                return false;
            }
            if(form.t4.value.length == 0) {
                alert("Please describe medical condition");
                form.t4.focus();
                return false;
            }
            return true;
        }
    </script>
{% endblock %}
