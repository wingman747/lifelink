{% extends "base.html" %}

{% block title %}Donation Drive - BloodApp{% endblock %}

{% block content %}
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: 36px;">Record Blood Donation</h1>
        <p style="color: #666;">Add a new blood donation to the system</p>
    </div>

    <div class="form-container" style="max-width: 500px;">
        <form method="post" action="{% url 'DonationDriveAction' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="donor">DONOR</label>
                <select id="donor" name="t1" required>
                    <option value="">Select Donor</option>
                    {{ data1|safe }}
                </select>
            </div>

            <div class="form-group">
                <label for="volume">VOLUME (in Liters)</label>
                <input type="number" id="volume" name="t2" placeholder="Enter blood volume" step="0.1" required>
            </div>

            <div class="form-group">
                <label for="bloodtype">BLOOD TYPE</label>
                <select id="bloodtype" name="t3" required>
                    <option value="">Select Blood Type</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <div class="form-group">
                <label for="expiry">EXPIRY DATE</label>
                <input type="date" id="expiry" name="t4" required>
            </div>

            <button type="submit">Record Donation</button>
        </form>
    </div>
{% endblock %}
