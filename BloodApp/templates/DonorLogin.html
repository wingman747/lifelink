{% extends "base.html" %}

{% block title %}Donor Login - BloodApp{% endblock %}

{% block content %}
    <div style="text-align: center; margin-bottom: 40px;">
        <p style="color: #dc2626; font-weight: 600; letter-spacing: 2px; font-size: 12px; margin-bottom: 15px;">SECURE ACCESS</p>
        <h1 style="font-size: 42px; color: #111; margin-bottom: 15px;">Donor Portal</h1>
        <p style="color: #666; font-size: 16px;">Track your donations and make a difference in someone's life.</p>
    </div>

    {% if data %}
        <div class="message {% if 'Invalid' in data %}error{% else %}success{% endif %}" style="max-width: 500px; margin: 0 auto 20px;">
            {{ data|safe }}
        </div>
    {% endif %}

    <div class="form-container">
        <form method="post" action="{% url 'DonorLoginAction' %}" onsubmit="return validateForm(this)">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username">USERNAME</label>
                <input type="text" id="username" name="t1" placeholder="Enter your username" required>
            </div>

            <div class="form-group">
                <label for="password">PASSWORD</label>
                <input type="password" id="password" name="t2" placeholder="Enter your password" required>
            </div>

            <div class="form-group">
                <label for="usertype">USER TYPE</label>
                <select id="usertype" name="t3" required>
                    <option value="Donor">Donor</option>
                </select>
            </div>

            <button type="submit">Sign In</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <p style="color: #666;">Don't have an account? 
                <a href="{% url 'Register' %}" style="color: #dc2626; font-weight: 600; text-decoration: none;">Sign Up</a>
            </p>
        </div>
    </div>

    <script>
        function validateForm(form) {
            if(form.t1.value.length == 0) {
                alert("Please Enter username");
                form.t1.focus();
                return false;
            }
            if(form.t2.value.length == 0) {
                alert("Please Enter password");
                form.t2.focus();
                return false;
            }
            return true;
        }
    </script>
{% endblock %}
