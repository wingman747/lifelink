{% extends "base.html" %}

{% block title %}Donor Dashboard - BloodApp{% endblock %}

{% block content %}
    <div style="margin-bottom: 30px;">
        <h1>Donor Dashboard</h1>
        {% if data %}
            <div class="message success">
                {{ data|safe }}
            </div>
        {% endif %}
    </div>

    <div style="background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 20px rgba(0,0,0,0.08);">
        <h2>Your Donation History</h2>
        <p style="color: #666; margin-bottom: 20px;">View all your blood donations</p>
        <div style="margin-top: 20px; overflow-x: auto;">
            {{ data|safe }}
        </div>
        <div style="margin-top: 20px;">
            <a href="{% url 'index' %}" style="background: #dc2626; color: white; padding: 10px 20px; border-radius: 5px; text-decoration: none; display: inline-block; font-weight: 600;">
                Back to Home
            </a>
        </div>
    </div>
{% endblock %}
