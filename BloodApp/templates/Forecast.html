{% extends "base.html" %}

{% block title %}Blood Demand Forecast - BloodApp{% endblock %}

{% block content %}
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: 36px;">Blood Demand Forecast</h1>
        <p style="color: #666;">Predict blood demand using machine learning</p>
    </div>

    <div class="form-container" style="max-width: 500px;">
        <form method="post" action="{% url 'ForecastAction' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="bloodtype">BLOOD TYPE</label>
                <select id="bloodtype" name="t1" required>
                    <option value="">Select Blood Type</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <div class="form-group">
                <label for="day">DAY OF WEEK</label>
                <select id="day" name="t2" required>
                    <option value="">Select Day</option>
                    <option value="Monday">Monday</option>
                    <option value="Tuesday">Tuesday</option>
                    <option value="Wednesday">Wednesday</option>
                    <option value="Thursday">Thursday</option>
                    <option value="Friday">Friday</option>
                    <option value="Saturday">Saturday</option>
                    <option value="Sunday">Sunday</option>
                </select>
            </div>

            <div class="form-group">
                <label for="month">MONTH</label>
                <select id="month" name="t3" required>
                    <option value="">Select Month</option>
                    <option value="1">January</option>
                    <option value="2">February</option>
                    <option value="3">March</option>
                    <option value="4">April</option>
                    <option value="5">May</option>
                    <option value="6">June</option>
                    <option value="7">July</option>
                    <option value="8">August</option>
                    <option value="9">September</option>
                    <option value="10">October</option>
                    <option value="11">November</option>
                    <option value="12">December</option>
                </select>
            </div>

            <div class="form-group">
                <label for="year">YEAR</label>
                <input type="number" id="year" name="t4" placeholder="Enter year (e.g., 2026)" required>
            </div>

            <button type="submit">Forecast Demand</button>
        </form>
    </div>
{% endblock %}
