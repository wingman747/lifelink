{% load static %}
<html>
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8" />
<title>LifeLink</title>
<meta name="keywords" content="" />
<meta name="Premium Series" content="" />
<link href="{% static 'default.css' %}" rel="stylesheet" type="text/css" media="screen" />
<script language="javascript">
function validateEmail(value) {
	if (/^\w+([\.-]?\w+)*@\w+([\.-]?\w+)*(\.\w{2,3})+$/.test(value)){
		return (true)
	}
	alert("Please enter valid email")
	return (false);
}
	function validate(formObj)
	{
	if(formObj.t1.value.length==0)
	{
	alert("Please Enter Username");
	formObj.t1.focus();
	return false;
	}

	if(formObj.t2.value.length==0)
	{
	alert("Please Enter Password");
	formObj.t2.focus();
	return false;
	}
	
	if(formObj.t3.value.length==0)
	{
	alert("Please enter phone no");
	formObj.t3.focus();
	return false;
	}
	if(!formObj.t3.value.match(/^\d{10}$/)){
		window.alert("Valid phone no must be enter");
		formObj.t3.focus();
		return false;
	}
	
	if(formObj.t4.value.length==0)
	{
	alert("Please enter email id");
	formObj.t4.focus();
	return false;
	}
	if(!validateEmail(formObj.t4.value)){
		document.f1.t4.focus();
		return false;
	}

	if(formObj.t5.value.length==0)
	{
	alert("Please enter address");
	formObj.t5.focus();
	return false;
	}
if(formObj.t6.value.length==0)
	{
	alert("Please enter your area or location name");
	formObj.t6.focus();
	return false;
	}
	if(formObj.t7.value.length==0)
	{
	alert("Please describe yourself");
	formObj.t7.focus();
	return false;
	}
		
	return true;
	}
	</script>
<style>
body {
  background-image: url("{% static 'images/back.jpg' %}");
}
</style>
</head>

<tr><td><font size="3" color="black">Username</td><td><input type="text" name="t1" size="30"/></td></tr>
<tr><td><font size="3" color="black">Password</td><td><input type="password" name="t2" size="30"/></td></tr>
