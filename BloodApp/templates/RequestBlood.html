{% extends "base.html" %}

{% block title %}Request Blood - LifeLink{% endblock %}

{% block content %}
    <div style="text-align: center; margin-bottom: 40px;">
        <p style="color: #dc2626; font-weight: 600; letter-spacing: 2px; font-size: 12px; margin-bottom: 15px;">BLOOD REQUEST</p>
        <h1 style="font-size: 42px; color: #111; margin-bottom: 15px;">Request Blood</h1>
        <p style="color: #666; font-size: 16px;">Submit a blood request for your hospital</p>
    </div>

    {% if message %}
        <div class="message {% if 'successfully' in message or 'submitted' in message %}success{% else %}error{% endif %}" style="max-width: 500px; margin: 20px auto;">
            {{ message }}
        </div>
    {% endif %}

    <div class="form-container">
        <form method="post" action="{% url 'RequestBloodAction' %}" onsubmit="return validateBloodRequest(this)">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="blood_type">BLOOD TYPE</label>
                <select id="blood_type" name="t1" required>
                    <option value="">Select Blood Type</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <div class="form-group">
                <label for="quantity">QUANTITY (LITRES)</label>
                <input type="number" id="quantity" name="t2" placeholder="Enter quantity" step="0.1" min="0.1" required>
            </div>

            <div class="form-group">
                <label for="urgency">URGENCY LEVEL</label>
                <select id="urgency" name="t3" required>
                    <option value="">Select Urgency</option>
                    <option value="Normal">Normal</option>
                    <option value="Urgent">Urgent</option>
                    <option value="Emergency">🚨 Emergency</option>
                </select>
            </div>

            <button type="submit">Submit Request</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <p style="color: #666;">
                <a href="{% url 'HospitalDashboard' %}" style="color: #dc2626; text-decoration: none; font-weight: 600;">← Back to Dashboard</a>
            </p>
        </div>
    </div>

    <script>
        function validateBloodRequest(form) {
            if(form.t1.value.length == 0) {
                alert("Please select blood type");
                form.t1.focus();
                return false;
            }
            if(form.t2.value.length == 0) {
                alert("Please enter quantity");
                form.t2.focus();
                return false;
            }
            if(form.t3.value.length == 0) {
                alert("Please select urgency level");
                form.t3.focus();
                return false;
            }
            return true;
        }
    </script>
{% endblock %}
