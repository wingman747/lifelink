{% extends "base.html" %}

{% block title %}Search Blood - BloodApp{% endblock %}

{% block content %}
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: 36px;">Search Blood Availability</h1>
        <p style="color: #666;">Find available blood from nearby blood banks</p>
    </div>

    <div class="form-container" style="max-width: 500px;">
        <form method="post" action="{% url 'SearchBloodAction' %}">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="bloodtype">BLOOD TYPE</label>
                <select id="bloodtype" name="t1" required>
                    <option value="">Select Blood Type</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                </select>
            </div>

            <div class="form-group">
                <label for="platelets">PLATELET COUNT</label>
                <input type="number" id="platelets" name="t2" placeholder="Enter minimum platelet count" required>
            </div>

            <button type="submit">Search Blood</button>
        </form>
    </div>
{% endblock %}
