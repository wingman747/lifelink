{% extends "base.html" %}

{% block title %}Update Inventory - BloodApp{% endblock %}

{% block content %}
    <div style="text-align: center; margin-bottom: 40px;">
        <h1 style="font-size: 36px;">Update Blood Inventory</h1>
        <p style="color: #666;">Add more blood units to your inventory</p>
    </div>

    <div class="form-container" style="max-width: 500px;">
        <form method="post" action="{% url 'UpdateInventoryAction' %}" onsubmit="return validateForm(this)">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="bloodtype">BLOOD TYPE</label>
                <input type="text" id="bloodtype" name="t1" value="{{ btype }}" readonly style="background: #f5f5f5;">
            </div>

            <div class="form-group">
                <label for="quantity">QUANTITY TO ADD (Liters)</label>
                <input type="number" id="quantity" name="t2" placeholder="Enter quantity" step="0.1" required>
            </div>

            <button type="submit">Update Inventory</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'ViewInventory' %}" style="color: #dc2626; font-weight: 600; text-decoration: none;">← Back to Inventory</a>
        </div>
    </div>

    <script>
        function validateForm(form) {
            if(form.t2.value.length == 0) {
                alert("Please Enter quantity");
                form.t2.focus();
                return false;
            }
            return true;
        }
    </script>
{% endblock %}
