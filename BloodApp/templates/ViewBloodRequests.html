{% extends "base.html" %}

{% block title %}View Blood Requests - LifeLink{% endblock %}

{% block content %}
    <div style="text-align: center; margin-bottom: 40px;">
        <p style="color: #dc2626; font-weight: 600; letter-spacing: 2px; font-size: 12px; margin-bottom: 15px;">VIEW REQUESTS</p>
        <h1 style="font-size: 42px; color: #111; margin-bottom: 15px;">Blood Requests</h1>
        <p style="color: #666; font-size: 16px;">Track all your blood requests</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Blood Type</th>
                <th>Quantity</th>
                <th>Urgency</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {{ data|safe }}
        </tbody>
    </table>

    <div style="text-align: center; margin-top: 30px;">
        <a href="{% url 'HospitalDashboard' %}" style="display: inline-block; padding: 12px 30px; background: #dc2626; color: white; text-decoration: none; border-radius: 5px; font-weight: 600;">← Back to Dashboard</a>
    </div>
{% endblock %}
