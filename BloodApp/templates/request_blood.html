{% extends "base.html" %}

{% block title %}Request Blood{% endblock %}

{% block content %}
<div style="max-width: 700px; margin: 0 auto; padding: 20px;">
    <h1 style="text-align: center; color: #dc2626; margin-bottom: 30px;">🩸 Request Blood</h1>
    
    <form method="POST" style="background: white; padding: 30px; border-radius: 10px; box-shadow: 0 2px 20px rgba(0,0,0,0.08);">
        {% csrf_token %}
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="blood_bank_id" style="display: block; font-weight: 600; margin-bottom: 8px;">
                <strong>📍 Select Blood Bank:</strong>
            </label>
            <select name="blood_bank_id" id="blood_bank_id" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
                <option value="">Choose a blood bank</option>
                {% for bank in blood_banks %}
                <option value="{{ bank.id }}">{{ bank.name }} - {{ bank.location_address }}</option>
                {% endfor %}
            </select>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="blood_type" style="display: block; font-weight: 600; margin-bottom: 8px;">
                <strong>🩸 Blood Type:</strong>
            </label>
            <select name="blood_type" id="blood_type" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
                <option value="">Select</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
            </select>
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="units_required" style="display: block; font-weight: 600; margin-bottom: 8px;">
                <strong>📦 Units Required:</strong>
            </label>
            <input type="number" name="units_required" id="units_required" min="1" value="1" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
        </div>
        
        <div class="form-group" style="margin-bottom: 20px;">
            <label for="urgency_level" style="display: block; font-weight: 600; margin-bottom: 8px;">
                <strong>⏰ Urgency Level:</strong>
            </label>
            <select name="urgency_level" id="urgency_level" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; font-size: 14px;">
                <option value="low">Low - Non-urgent</option>
                <option value="medium" selected>Medium - Urgent</option>
                <option value="high">High - Critical 🚨</option>
            </select>
        </div>
        
        <button type="submit" style="background: #dc2626; color: white; padding: 12px 30px; border: none; border-radius: 5px; font-weight: 600; width: 100%; font-size: 14px; cursor: pointer;">
            📨 Send Request
        </button>
    </form>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const formData = new FormData(this);
    
    fetch('{% url "request_blood" %}', {
        method: 'POST',
        body: formData,
        headers: {
            'X-CSRFToken': '{{ csrf_token }}'
        }
    })
    .then(r => r.json())
    .then(data => {
        if (data.success) {
            alert('✅ Blood request sent successfully!');
            window.location.href = "{% url 'hospital_blood_requests' %}";
        } else {
            alert('Error: ' + data.error);
        }
    });
});
</script>
{% endblock %}
